<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中语文背诵 · 必修上册</title>
<style>
/* ===== 全局重置 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; background: #faf9f5; color: #222; line-height: 1.8; }

/* ===== 顶部导航 ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  background: #2c3e50; color: #ecf0f1; padding: 10px 20px;
  position: sticky; top: 0; z-index: 200;
}
.topbar .logo { color: #f39c12; text-decoration: none; font-weight: bold; font-size: 18px; }
.topbar nav a { color: #bdc3c7; margin-left: 14px; text-decoration: none; font-size: 14px; }
.topbar nav a.active { color: #f1c40f; font-weight: bold; }
.topbar nav a:hover { color: #fff; }

/* ===== 主布局 ===== */
#app { display: flex; min-height: calc(100vh - 90px); max-width: 1600px; margin: 0 auto; }

/* ===== 左侧面板 ===== */
#sidebar {
  width: 280px; background: #f0ede8; padding: 16px;
  border-right: 1px solid #ddd; overflow-y: auto; flex-shrink: 0;
}
.search-box input {
  width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 14px; margin-bottom: 10px;
}
.category-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.cat-btn {
  padding: 4px 10px; border: 1px solid #aaa; border-radius: 12px;
  background: #fff; cursor: pointer; font-size: 12px;
}
.cat-btn.active { background: #d35400; color: #fff; border-color: #d35400; }
.hot-section { font-size: 13px; margin-bottom: 10px; }
.hot-item {
  color: #2980b9; cursor: pointer; text-decoration: underline dotted; margin-right: 8px;
}
.hot-item:hover { color: #e74c3c; }
.progress-info { font-size: 14px; margin-bottom: 10px; color: #555; }
#poem-list { list-style: none; }
#poem-list li {
  padding: 8px 12px; cursor: pointer; border-radius: 4px;
  margin-bottom: 4px; font-size: 14px; transition: all .2s;
}
#poem-list li:hover { background: #e0dcd5; }
#poem-list li.active { background: #d35400; color: #fff; font-weight: bold; }

/* ===== 右侧内容 ===== */
#content { flex: 1; padding: 24px 32px; overflow-y: auto; }

/* ===== 头部 ===== */
#poem-title { font-size: 26px; color: #2c3e50; }
#poem-meta { color: #7f8c8d; font-size: 14px; margin-top: 4px; }
#toolbar { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
#toolbar button, #toolbar select {
  padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px;
  background: #fff; cursor: pointer; font-size: 14px;
}
#toolbar button:hover { background: #eee; }
#fill-level-wrap { display: flex; align-items: center; gap: 6px; font-size: 14px; }
#fill-density { width: 80px; }

/* ===== 正文 ===== */
#poem-body {
  font-size: 18px; line-height: 2.4;
  background: #fffdf9; padding: 24px 32px; border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  min-height: 250px; margin-bottom: 20px;
}
#poem-body p { margin-bottom: 0.8em; text-indent: 2em; }
#poem-body .stanza { margin-bottom: 1.2em; }

/* 拼音 ruby */
ruby { ruby-align: center; }
rt { font-size: 70%; color: #888; }

/* 易错字下划线 */
.typo {
  border-bottom: 2px dashed #e74c3c;
  cursor: help;
  position: relative;
  padding: 0 1px;
  transition: background .2s;
}
.typo:hover {
  border-bottom-style: solid;
  background: rgba(231,76,60,.08);
}
.typo::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 135%;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.typo:hover::after { opacity: 1; }

/* 注释锚点 */
.note-ref {
  color: #2980b9;
  cursor: pointer;
  border-bottom: 1px dotted #2980b9;
  text-decoration: none;
}
.note-ref:hover { background: #eaf2f8; }

/* 挖空 */
.blank {
  display: inline-block;
  min-width: 1.2em;
  border-bottom: 2px solid #3498db;
  color: transparent;
  user-select: none;
  position: relative;
}
.blank.revealed { color: inherit; border-color: #27ae60; }

/* 默写输入框 */
.input-blank {
  display: inline-block;
  border: none;
  border-bottom: 2px solid #95a5a6;
  background: transparent;
  font-size: inherit;
  font-family: inherit;
  min-width: 1.5em;
  outline: none;
  text-align: center;
  color: #2c3e50;
}
.input-blank.correct { border-bottom-color: #27ae60; background: #eafaf1; }
.input-blank.wrong { border-bottom-color: #e74c3c; background: #fdedec; }

/* 句读隐藏 */
.judou-hidden .judou { display: none; }

/* ===== 额外Tab ===== */
#extra-tabs { margin-top: 20px; }
.tab-buttons { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px;
  background: #f5f5f5; cursor: pointer; font-size: 14px;
}
.tab-btn.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
.tab-content {
  background: #fff; padding: 16px 20px; border-radius: 6px;
  border: 1px solid #eee; min-height: 100px; line-height: 1.9;
}
.tab-content ul { list-style: none; }
.tab-content li { margin-bottom: 6px; }
.tab-content .note-word { font-weight: bold; color: #d35400; }

/* ===== 易错字汇总 ===== */
#typo-summary {
  margin-top: 20px;
  padding: 12px 16px;
  background: #fef9e7;
  border-left: 4px solid #f39c12;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.8;
}
#typo-summary .typo-link {
  color: #2980b9;
  cursor: pointer;
  text-decoration: underline dotted;
  margin-right: 10px;
}
#typo-summary .typo-link:hover { color: #e74c3c; }

/* ===== 底部工具栏 ===== */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #2c3e50;
  color: #ecf0f1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 10px 20px;
  z-index: 999;
  font-size: 14px;
}
#bottom-bar button {
  padding: 6px 16px;
  border: none;
  border-radius: 6px;
  background: #f39c12;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
#bottom-bar button:hover { background: #e67e22; }
#status-msg { color: #bdc3c7; }

/* ===== Footer ===== */
footer {
  background: #2c3e50; color: #bdc3c7;
  text-align: center; padding: 16px; font-size: 13px;
  margin-bottom: 48px; /* 给底部工具栏留空间 */
}

/* ===== 响应式 ===== */
@media (max-width: 800px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
}
/* ========== 第二段 CSS 从这里开始 ========== */
</style>
</head>
<body>

<!-- 顶部导航（与主站一致） -->
<header class="topbar">
  <a href="https://gzxxw.github.io" class="logo">gzxxw 主站</a>
  <nav>
    <a href="../math/">数学</a>
    <a href="../chinese/" class="active">语文</a>
    <a href="../english/">英语</a>
    <a href="../physics/">物理</a>
    <a href="../biology/">生物</a>
    <a href="../history/">历史</a>
    <a href="../geography/">地理</a>
    <a href="../politics/">政治</a>
    <a href="../tech/">信息技术</a>
  </nav>
</header>

<div id="app">
  <!-- 左侧面板：搜索 + 分类 + 列表 + 进度 -->
  <aside id="sidebar">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索篇名/作者/朝代..." />
    </div>
    <div class="category-tabs">
      <button class="cat-btn active" data-cat="bx1">必修上</button>
      <button class="cat-btn" data-cat="bx2">必修下</button>
      <button class="cat-btn" data-cat="xb1">选必上</button>
      <button class="cat-btn" data-cat="xb2">选必中</button>
      <button class="cat-btn" data-cat="xb3">选必下</button>
    </div>
    <div class="hot-section">
      <span class="hot-label">🔥 热门/易错：</span>
      <span class="hot-item" data-id="chibi-fu">赤壁赋</span>
      <span class="hot-item" data-id="quanxue">劝学</span>
      <span class="hot-item" data-id="lishao">离骚</span>
      <span class="hot-item" data-id="pipaxing">琵琶行</span>
    </div>
    <div class="progress-info">
      <span>📚 已背 <strong id="learned-count">0</strong>/72</span>
      <span> · 生疏 <strong id="weak-count">0</strong> 篇</span>
    </div>
    <hr>
    <h2>📖 必修上册篇目</h2>
    <ul id="poem-list"></ul>
  </aside>

  <!-- 右侧主内容区 -->
  <section id="content">
    <div id="reader">
      <!-- 头部 -->
      <div id="poem-header">
        <h1 id="poem-title"></h1>
        <p id="poem-meta"></p>
        <div id="toolbar">
          <button id="btn-play" title="播放朗读（暂缺）">🔊 朗读</button>
          <button id="btn-judou" title="切换句读">⏸ 句读</button>
          <select id="mode-select">
            <option value="read">📖 阅读</option>
            <option value="fill">✍️ 挖空背诵</option>
            <option value="quiz">📝 默写自测</option>
          </select>
          <span id="fill-level-wrap" style="display:none;">
            挖空密度：<input type="range" id="fill-density" min="1" max="5" value="3"> <span id="density-label">中等</span>
          </span>
          <button id="btn-random-fill" title="随机挖空">🎲 随机</button>
          <button id="btn-first-word" title="句首字模式">🔤 句首</button>
        </div>
      </div>

      <!-- 正文区域 -->
      <div id="poem-body"></div>

      <!-- 注释/译文/赏析 Tab -->
      <div id="extra-tabs">
        <div class="tab-buttons">
          <button class="tab-btn active" data-tab="notes">📝 注释</button>
          <button class="tab-btn" data-tab="translation">🌐 译文</button>
          <button class="tab-btn" data-tab="analysis">🎨 赏析</button>
        </div>
        <div class="tab-content" id="tab-notes"></div>
        <div class="tab-content" id="tab-translation" style="display:none;"></div>
        <div class="tab-content" id="tab-analysis" style="display:none;"></div>
      </div>

      <!-- 易错字汇总 -->
      <div id="typo-summary"></div>
    </div>
  </section>
</div>

<!-- 底部固定背诵工具栏 -->
<div id="bottom-bar">
  <button id="btn-mark-weak" title="标记当前句为生疏">⭐ 生疏</button>
  <button id="btn-reset-progress">🔄 重置进度</button>
  <span id="status-msg"></span>
</div>

<footer>
  <p>© 2026 gzxxw.github.io · 语文背诵站 · 数据持续完善中</p>
</footer>

<script>

</body>
</html>
