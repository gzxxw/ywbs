<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中语文背诵</title>
<style>
/* ===== 全局重置 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; background: #faf9f5; color: #222; line-height: 1.8; }

/* ===== 顶部导航 ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  background: #2c3e50; color: #ecf0f1; padding: 10px 20px;
  position: sticky; top: 0; z-index: 200;
}
.topbar .logo { color: #f39c12; text-decoration: none; font-weight: bold; font-size: 18px; }
.topbar nav a { color: #bdc3c7; margin-left: 14px; text-decoration: none; font-size: 14px; }
.topbar nav a.active { color: #f1c40f; font-weight: bold; }
.topbar nav a:hover { color: #fff; }

/* ===== 主布局 ===== */
#app { display: flex; min-height: calc(100vh - 90px); max-width: 1600px; margin: 0 auto; }

/* ===== 左侧面板 ===== */
#sidebar {
  width: 280px; background: #f0ede8; padding: 16px;
  border-right: 1px solid #ddd; overflow-y: auto; flex-shrink: 0;
}
.search-box input {
  width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 14px; margin-bottom: 10px;
}
.category-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.cat-btn {
  padding: 4px 10px; border: 1px solid #aaa; border-radius: 12px;
  background: #fff; cursor: pointer; font-size: 12px;
}
.cat-btn.active { background: #d35400; color: #fff; border-color: #d35400; }
.hot-section { font-size: 13px; margin-bottom: 10px; }
.hot-item {
  color: #2980b9; cursor: pointer; text-decoration: underline dotted; margin-right: 8px;
}
.hot-item:hover { color: #e74c3c; }
.progress-info { font-size: 14px; margin-bottom: 10px; color: #555; }
#poem-list { list-style: none; }
#poem-list li {
  padding: 8px 12px; cursor: pointer; border-radius: 4px;
  margin-bottom: 4px; font-size: 14px; transition: all .2s;
}
#poem-list li:hover { background: #e0dcd5; }
#poem-list li.active { background: #d35400; color: #fff; font-weight: bold; }

/* ===== 右侧内容 ===== */
#content { flex: 1; padding: 24px 32px; overflow-y: auto; }

/* ===== 头部 ===== */
#poem-title { font-size: 26px; color: #2c3e50; }
#poem-meta { color: #7f8c8d; font-size: 14px; margin-top: 4px; }
#toolbar { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
#toolbar button, #toolbar select {
  padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px;
  background: #fff; cursor: pointer; font-size: 14px;
}
#toolbar button:hover { background: #eee; }
#fill-level-wrap { display: flex; align-items: center; gap: 6px; font-size: 14px; }
#fill-density { width: 80px; }

/* ===== 正文 ===== */
#poem-body {
  font-size: 18px; line-height: 2.4;
  background: #fffdf9; padding: 24px 32px; border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  min-height: 250px; margin-bottom: 20px;
}
#poem-body p { margin-bottom: 0.8em; text-indent: 2em; }
#poem-body .stanza { margin-bottom: 1.2em; }

/* 拼音 ruby */
ruby { ruby-align: center; }
rt { font-size: 70%; color: #888; }

/* 易错字下划线 */
.typo {
  border-bottom: 2px dashed #e74c3c;
  cursor: help;
  position: relative;
  padding: 0 1px;
  transition: background .2s;
}
.typo:hover {
  border-bottom-style: solid;
  background: rgba(231,76,60,.08);
}
.typo::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 135%;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.typo:hover::after { opacity: 1; }

/* 注释锚点 */
.note-ref {
  color: #2980b9;
  cursor: pointer;
  border-bottom: 1px dotted #2980b9;
  text-decoration: none;
}
.note-ref:hover { background: #eaf2f8; }

/* 挖空 */
.blank {
  display: inline-block;
  min-width: 1.2em;
  border-bottom: 2px solid #3498db;
  color: transparent;
  user-select: none;
  position: relative;
}
.blank.revealed { color: inherit; border-color: #27ae60; }

/* 默写输入框 */
.input-blank {
  display: inline-block;
  border: none;
  border-bottom: 2px solid #95a5a6;
  background: transparent;
  font-size: inherit;
  font-family: inherit;
  min-width: 1.5em;
  outline: none;
  text-align: center;
  color: #2c3e50;
}
.input-blank.correct { border-bottom-color: #27ae60; background: #eafaf1; }
.input-blank.wrong { border-bottom-color: #e74c3c; background: #fdedec; }

/* 句读隐藏 */
.judou-hidden .judou { display: none; }

/* ===== 额外Tab ===== */
#extra-tabs { margin-top: 20px; }
.tab-buttons { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px;
  background: #f5f5f5; cursor: pointer; font-size: 14px;
}
.tab-btn.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
.tab-content {
  background: #fff; padding: 16px 20px; border-radius: 6px;
  border: 1px solid #eee; min-height: 100px; line-height: 1.9;
}
.tab-content ul { list-style: none; }
.tab-content li { margin-bottom: 6px; }
.tab-content .note-word { font-weight: bold; color: #d35400; }

/* ===== 易错字汇总 ===== */
#typo-summary {
  margin-top: 20px;
  padding: 12px 16px;
  background: #fef9e7;
  border-left: 4px solid #f39c12;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.8;
}
#typo-summary .typo-link {
  color: #2980b9;
  cursor: pointer;
  text-decoration: underline dotted;
  margin-right: 10px;
}
#typo-summary .typo-link:hover { color: #e74c3c; }

/* ===== 底部工具栏 ===== */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #2c3e50;
  color: #ecf0f1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 10px 20px;
  z-index: 999;
  font-size: 14px;
}
#bottom-bar button {
  padding: 6px 16px;
  border: none;
  border-radius: 6px;
  background: #f39c12;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
#bottom-bar button:hover { background: #e67e22; }
#status-msg { color: #bdc3c7; }

/* ===== Footer ===== */
footer {
  background: #2c3e50; color: #bdc3c7;
  text-align: center; padding: 16px; font-size: 13px;
  margin-bottom: 48px; /* 给底部工具栏留空间 */
}

/* ===== 响应式 ===== */
@media (max-width: 800px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
}
/* ========== 第二段 CSS 从这里开始 ========== */
</style>

const poemsData = {
    "qinyuanchun": {

        content: [
            { text: "独立寒秋，湘江北去，橘子洲头。", pinyin: ["", "", "", "", "", "", "", "", "", "", "", ""], typoPos: [] },
            { text: "看万山红遍，层林尽染；漫江碧透，百舸争流。", pinyin: ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "gě"], typoPos: [19] },
            { text: "鹰击长空，鱼翔浅底，万类霜天竞自由。", pinyin: ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""], typoPos: [] },
            { text: "怅寥廓，问苍茫大地，谁主沉浮？", pinyin: ["", "liáo kuò", "", "", "", "", "", "", "", "", "", ""], typoPos: [1, 2] },

            { text: "恰同学少年，风华正茂；书生意气，挥斥方遒。", pinyin: ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "qiú"], typoPos: [17] },
            { text: "指点江山，激扬文字，粪土当年万户侯。", pinyin: ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "hóu"], typoPos: [18] },
            { text: "曾记否，到中流击水，浪遏飞舟？", pinyin: ["", "", "", "", "", "", "", "", "", "", "è", "", "", ""], typoPos: [10] }
        ],
        notes: [

        translation: "深秋时节，我独自站在橘子洲头，望着湘江向北奔流。看万千山峰全都变成了红色，层层树林好像染过颜色一样；江水清澈澄碧，一艘艘大船乘风破浪前行。鹰在广阔的天空里飞，鱼在清澈的水里游，万物都在深秋中争求自由。面对着无边无际的宇宙，（千万种思绪一齐涌上心头）我要问：这苍茫大地的盛衰兴废，由谁来主宰呢？\n\n曾经我和我的同学，经常携手结伴到这里漫游。在一起商讨国家大事，那无数不平凡的岁月至今还萦绕在我的心头。同学们正值青春年少，风采才华正盛；大家踌躇满志，意气奔放，正强劲有力。评论国家大事，写出这些激浊扬清的文章，把当时的军阀官僚看得如同粪土。可曾记得，那时我们在江水深急的地方游泳，那激起的浪花几乎挡住了疾驰而来的船？",

        translation: "一边喝酒一边高歌，人生的岁月有多少？好比晨露转瞬即逝，逝去的时光实在太多！宴会上的歌声激昂慷慨，忧愁却难以遗忘。用什么来排解忧愁？只有豪饮美酒。\n\n有学识的才子们啊，你们令我朝夕思慕。只是因为您的缘故，让我沉痛吟诵至今。阳光下鹿群呦呦欢鸣，在原野吃着艾蒿。一旦四方贤才光临舍下，我将奏瑟吹笙宴请嘉宾。\n\n当空悬挂的皓月哟，什么时候可以摘取呢？忧愁从心中涌出，像长丝一样连续不断。穿过纵横交错的小路，枉驾来访。久别重逢谈心宴饮，心中惦念着往日的情谊。\n\n月光明亮星光稀疏，一群寻巢乌鹊向南飞去。绕树飞了几圈却没敛翅，哪个枝头才是它们的栖身之处？高山不嫌弃土壤，所以能成就其高大；大海不嫌弃细流，所以能成就其深邃。只有像周公那样礼待贤才，才能使天下人心都归向我。",

const typoSummaryEl = document.getElementById("typo-summary");

// ------------------- 初始化篇目列表 -------------------
function renderPoemList(filterCat = "bx1", keyword = "") {
    poemListEl.innerHTML = "";
    Object.values(poemsData).forEach(poem => {
        if (poem.category !== filterCat) return;
        if (keyword && !poem.title.includes(keyword) && !poem.author.includes(keyword)) return;
        
        const li = document.createElement("li");
        li.textContent = poem.title;
        li.dataset.id = poem.id;
        if (poem.id === currentPoemId) li.classList.add("active");
        li.onclick = () => switchPoem(poem.id);
        poemListEl.appendChild(li);
    });
}
renderPoemList();

// ------------------- 切换篇目 -------------------
function switchPoem(id) {
    currentPoemId = id;
    revealedBlanks.clear();
    document.querySelectorAll("#poem-list li").forEach(li => {
        li.classList.toggle("active", li.dataset.id === id);
    });
    renderCurrentPoem();
}

// ------------------- 渲染当前篇目 -------------------
function renderCurrentPoem() {
    const poem = poemsData[currentPoemId];
    if (!poem) return;

    poemTitleEl.textContent = poem.title;
    poemMetaEl.textContent = `${poem.dynasty} · ${poem.author}`;
    
    // 渲染正文
    poemBodyEl.innerHTML = "";
    poem.content.forEach((para, pIdx) => {
        const p = document.createElement("p");
        p.className = "stanza";
        
        // 处理句读
        let displayText = para.text;
        if (!showJudou) {
            displayText = displayText.replace(/[，。？！；：、]/g, "");
        }

        // 构建带拼音和易错字的HTML
        let html = "";
        for (let i = 0; i < displayText.length; i++) {
            const char = displayText[i];
            const isTypo = para.typoPos.includes(i);
            const py = para.pinyin[i];
            
            let charHtml = char;
            if (py) {
                charHtml = `<ruby>${char}<rt>${py}</rt></ruby>`;
            }
            if (isTypo) {
                const note = poem.notes.find(n => n.pos[0] === pIdx && n.pos[1] === i);
                charHtml = `<span class="typo" data-tip="${note ? note.explain : '易错字'}">${charHtml}</span>`;
            }
            
            // 挖空逻辑
            if (currentMode === "fill" && !isTypo) {
                const density = parseInt(fillDensity.value);
                // 简单间隔挖空逻辑（跳过标点和拼音）
                if ((pIdx * 100 + i) % density === 0 && char.match(/[\u4e00-\u9fa5]/)) {
                    const blankId = `blank-${pIdx}-${i}`;
                    const isRevealed = revealedBlanks.has(blankId);
                    charHtml = `<span class="blank ${isRevealed ? 'revealed' : ''}" data-blank-id="${blankId}" onclick="revealBlank('${blankId}', '${char}')">${isRevealed ? charHtml : '&nbsp;'}</span>`;
                }
            }
            
            // 默写逻辑
            if (currentMode === "quiz") {
                if (char.match(/[\u4e00-\u9fa5]/)) {
                    charHtml = `<input type="text" class="input-blank" data-correct="${char}" maxlength="1" oninput="checkInput(this)">`;
                }
            }
            
            html += charHtml;
        }
        p.innerHTML = html;
        poemBodyEl.appendChild(p);
    });

    // 渲染注释
    tabNotes.innerHTML = "<ul>" + poem.notes.map(n => `<li><span class="note-word">${n.word}：</span>${n.explain}</li>`).join("") + "</ul>";
    
    // 渲染译文
    tabTranslation.innerHTML = poem.translation.split('\n').map(p => `<p>${p}</p>`).join("");
    
    // 渲染赏析
    tabAnalysis.innerHTML = poem.analysis.split('\n').map(p => `<p>${p}</p>`).join("");
    
    // 渲染易错字汇总
    typoSummaryEl.innerHTML = "📌 <strong>本文易错字：</strong>" +
        poem.typos.map(t => `<span class="typo-link" onclick="highlightTypo('${t}')">${t}</span>`).join("");

    updateProgressUI();
}

// ------------------- 交互功能 -------------------

// 模式切换
modeSelect.onchange = (e) => {
    currentMode = e.target.value;
    fillLevelWrap.style.display = (currentMode === "fill") ? "flex" : "none";
    revealedBlanks.clear();
    renderCurrentPoem();
};

// 挖空密度
fillDensity.oninput = () => {
    densityLabel.textContent = ["极密","密集","中等","稀疏","极疏"][fillDensity.value - 1];
    if (currentMode === "fill") renderCurrentPoem();
};

// 句读切换
btnJudou.onclick = () => {
    showJudou = !showJudou;
    btnJudou.textContent = showJudou ? "⏸ 句读" : "👁 句读";
    renderCurrentPoem();
};

// Tab切换
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
        const tabId = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
        document.getElementById(`tab-${tabId}`).style.display = "block";
    };
});

// 搜索
searchInput.oninput = (e) => {
    const catBtn = document.querySelector(".cat-btn.active");
    renderPoemList(catBtn.dataset.cat, e.target.value.trim());
};

// 分类切换
document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderPoemList(btn.dataset.cat, searchInput.value.trim());
    };
});

// 热门篇目点击
document.querySelectorAll(".hot-item").forEach(item => {
    item.onclick = () => switchPoem(item.dataset.id);
});

// 揭示挖空
window.revealBlank = (id, char) => {
    const el = document.querySelector(`[data-blank-id="${id}"]`);
    if (el && !el.classList.contains("revealed")) {
        el.innerHTML = char;
        el.classList.add("revealed");
        revealedBlanks.add(id);
    }
};

// 默写校验
window.checkInput = (input) => {
    const correct = input.dataset.correct;
    if (input.value === correct) {
        input.classList.remove("wrong");
        input.classList.add("correct");
    } else if (input.value !== "") {
        input.classList.remove("correct");
        input.classList.add("wrong");
    } else {
        input.classList.remove("correct", "wrong");
    }
};

// 标记生疏
document.getElementById("btn-mark-weak").onclick = () => {
    if (weakSet.has(currentPoemId)) {
        weakSet.delete(currentPoemId);
        alert("已从生疏本移除");
    } else {
        weakSet.add(currentPoemId);
        alert("已加入生疏本，复习时重点关注");
    }
    saveProgress();
    updateProgressUI();
};

// 重置进度
document.getElementById("btn-reset-progress").onclick = () => {
    if (confirm("确定要重置所有背诵进度和生疏标记吗？")) {
        learnedSet.clear();
        weakSet.clear();
        saveProgress();
        updateProgressUI();
    }
};

// 高亮易错字
window.highlightTypo = (char) => {
    const poem = poemsData[currentPoemId];
    if (!poem) return;
    // 简单的滚动查找，实际应用中可以更精确
    const typoEls = document.querySelectorAll(".typo");
    typoEls.forEach(el => {
        if (el.textContent.includes(char)) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.style.background = "rgba(231,76,60,.2)";
            setTimeout(() => el.style.background = "", 1500);
        }
    });
};

// ------------------- 进度管理 -------------------
function saveProgress() {
    localStorage.setItem("yybs_learned", JSON.stringify([...learnedSet]));
    localStorage.setItem("yybs_weak", JSON.stringify([...weakSet]));
}

function updateProgressUI() {
    document.getElementById("learned-count").textContent = learnedSet.size;
    document.getElementById("weak-count").textContent = weakSet.size;
    
    // 如果当前篇目不在已背列表，点击正文区域自动加入（模拟学习行为）
    poemBodyEl.onclick = () => {
        if (!learnedSet.has(currentPoemId)) {
            learnedSet.add(currentPoemId);
            saveProgress();
            updateProgressUI();
        }
    };
}

// 初始渲染
renderCurrentPoem();
updateProgressUI();

</script>
</body>
